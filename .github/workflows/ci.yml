name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Run SwiftFormat (check only)
        run: swiftformat --swiftversion 5.9 --lint WaveMute/

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Run ShellCheck
        run: shellcheck build.sh

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install hidapi
        run: brew install hidapi

      - name: Build app
        run: bash build.sh

      - name: Verify bundle structure
        run: |
          test -f WaveMute.app/Contents/MacOS/WaveMute
          test -f WaveMute.app/Contents/Frameworks/libhidapi.dylib
          test -f WaveMute.app/Contents/Resources/AppIcon.icns
          test -f WaveMute.app/Contents/Info.plist
          echo "Bundle structure OK"

      - name: Verify binary runs
        run: |
          /WaveMute.app/Contents/MacOS/WaveMute &
          APP_PID=$!
          sleep 3
          if kill -0 $APP_PID 2>/dev/null; then
            kill $APP_PID
            echo "Binary started successfully"
          else
            echo "Binary died on startup" && exit 1
          fi
        continue-on-error: true

  security:
    name: Security
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: brew install gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --redact
