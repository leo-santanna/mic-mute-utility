repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        files: \.(yml|yaml)$
      - id: check-json
        files: \.json$
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: swiftformat
        name: SwiftFormat
        language: system
        entry: swiftformat
        args: [--swiftversion, "5.9", --lint]
        types: [swift]
        pass_filenames: false

  - repo: local
    hooks:
      - id: swiftlint
        name: SwiftLint
        language: system
        entry: swiftlint lint --strict
        types: [swift]
        pass_filenames: false

      - id: shellcheck
        name: ShellCheck
        language: system
        entry: shellcheck
        files: \.sh$

      - id: gitleaks
        name: Gitleaks (secret scan)
        language: system
        entry: gitleaks protect --staged --redact
        pass_filenames: false
        stages: [pre-commit]
